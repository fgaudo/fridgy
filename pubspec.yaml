name: fridgy
description: A new Flutter project.

# Prevent accidental publishing to pub.dev.
publish_to: 'none'

version: 0.0.1

environment:
  sdk: '>=3.2.3 <4.0.0'

dependencies:
  async: 
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  functionally:
    path: ../functionally
  go_router:
  logging:
  sqlite3:
  rxdart:
  sqlite3_flutter_libs :
  uuid:

dev_dependencies:
  flutter_lints: 
  flutter_test:
    sdk: flutter
flutter:
  uses-material-design: true

  # Enable generation of localized Strings from arb files.
  generate: true

  assets:
    # Add assets from the images directory to the application.
    - lib/src/presentation/assets/images/
