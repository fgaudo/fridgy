name: fridgy
description: A new Flutter project.

# Prevent accidental publishing to pub.dev.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.1.4 <4.0.0'

dependencies:
  async: 
  fgaudo_functional:
    path: '../fgaudo_functional'
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  logging:
  rxdart: 
  uuid: 

dev_dependencies:
  flutter_lints: 
  flutter_test:
    sdk: flutter
flutter:
